---
# Release Please Workflow
# Supports both main branch and LTS (Long-Term Support) branches.
# LTS branches must follow the naming pattern: release-v{major} (e.g., release-v3)
# See RELEASE.md for full documentation on LTS releases.
name: release-please
on:
  push:
    branches:
      - main
      - release-v*  # LTS branches (e.g., release-v3, release-v4)
  workflow_dispatch:
jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: 🚀 release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5
        with:
          release-type: maven
          target-branch: ${{ github.ref_name }}
